<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Mi Galería - Frutas</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    /* Estilos básicos para presentación */
    body { font-family: Arial, sans-serif; margin:20px; background:#f7f7f7; }
    header { display:flex; justify-content:space-between; align-items:center; }
    .controls { margin: 15px 0; display:flex; gap:10px; flex-wrap:wrap; }
    #gallery { display:grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
    .card { background:white; padding:10px; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.1); cursor:pointer; }
    .card img { width:100%; height:140px; object-fit:cover; border-radius:6px; }
    .card h4 { margin:8px 0 4px; font-size:16px; }
    .card p { margin:0; font-size:13px; color:#555; }
    footer { margin-top:20px; text-align:center; color:#666; }
    dialog { padding:20px; border-radius:8px; }
    .modal-img { width:100%; max-height:300px; object-fit:cover; border-radius:6px; }
  </style>
</head>
<body>
  <header>
    <h1>Mi Galería Multimedia — Frutas</h1>
    <div>
      <button id="btnLoad">Cargar galería</button>
      <button id="toRegister">Ir al registro</button>
    </div>
  </header>

  <section class="controls">
    <input id="search" type="text" placeholder="Buscar por título...">
    <select id="category">
      <option value="all">Todas las categorías</option>
    </select>
  </section>

  <section id="gallery" aria-live="polite">
    <!-- Tarjetas generadas dinámicamente -->
  </section>

  <dialog id="detailDialog">
    <h3 id="dTitle"></h3>
    <img id="dImg" class="modal-img" src="" alt="">
    <p><strong>Categoría:</strong> <span id="dCat"></span></p>
    <p><strong>Año:</strong> <span id="dYear"></span></p>
    <p id="dDesc"></p>
    <menu>
      <button id="closeDetail">Cerrar</button>
    </menu>
  </dialog>

  <footer>
    <small>Proyecto para la asignatura — Tema: Frutas</small>
  </footer>

<script>
/* Comentarios breves: Este script carga el XML, crea tarjetas, y permite filtros y modal. */

let xmlData = null;
const btnLoad = document.getElementById('btnLoad');
const gallery = document.getElementById('gallery');
const searchInput = document.getElementById('search');
const categorySelect = document.getElementById('category');
const toRegister = document.getElementById('toRegister');
const dialog = document.getElementById('detailDialog');

btnLoad.addEventListener('click', loadGallery);
toRegister.addEventListener('click', () => { window.location.href = 'registro.html'; });

function loadGallery() {
  fetch('galeria.xml')
    .then(r => r.text())
    .then(str => {
      const parser = new DOMParser();
      const xml = parser.parseFromString(str, "application/xml");
      xmlData = xml;
      renderGallery(xml);
      populateCategories(xml);
    })
    .catch(err => {
      alert('Error cargando galería: ' + err);
    });
}

function renderGallery(xml) {
  gallery.innerHTML = '';
  const elementos = Array.from(xml.getElementsByTagName('elemento'));
  elementos.forEach(el => {
    const titulo = el.getElementsByTagName('titulo')[0].textContent;
    const categoria = el.getElementsByTagName('categoria')[0].textContent;
    const anio = el.getElementsByTagName('anio')[0].textContent;
    const descripcion = el.getElementsByTagName('descripcion')[0].textContent;
    const imagen = el.getElementsByTagName('imagen')[0].textContent;

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${imagen}" alt="${titulo}">
      <h4>${titulo}</h4>
      <p>${categoria} · ${anio}</p>
    `;
    // Al hacer clic, abrimos el modal con detalles
    card.addEventListener('click', () => openDetail({titulo,categoria,anio,descripcion,imagen}));
    gallery.appendChild(card);
  });
  applyFilters(); // aplicar filtros si hay texto
}

function populateCategories(xml) {
  const elems = Array.from(xml.getElementsByTagName('elemento'));
  const cats = new Set(elems.map(e => e.getElementsByTagName('categoria')[0].textContent));
  // Limpiar y añadir opciones
  categorySelect.innerHTML = '<option value="all">Todas las categorías</option>';
  Array.from(cats).sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    categorySelect.appendChild(opt);
  });
}

// Filtrado en tiempo real por título
searchInput.addEventListener('input', applyFilters);
categorySelect.addEventListener('change', applyFilters);

function applyFilters() {
  const query = searchInput.value.toLowerCase();
  const cat = categorySelect.value;
  Array.from(gallery.children).forEach(card => {
    const title = card.querySelector('h4').textContent.toLowerCase();
    const info = card.querySelector('p').textContent;
    const matchesText = title.includes(query);
    const matchesCat = (cat === 'all') ? true : info.includes(cat);
    card.style.display = (matchesText && matchesCat) ? '' : 'none';
  });
}

// Modal detalle usando <dialog>
function openDetail(data) {
  document.getElementById('dTitle').textContent = data.titulo;
  document.getElementById('dImg').src = data.imagen;
  document.getElementById('dCat').textContent = data.categoria;
  document.getElementById('dYear').textContent = data.anio;
  document.getElementById('dDesc').textContent = data.descripcion;
  if (typeof dialog.showModal === "function") {
    dialog.showModal();
  } else {
    alert(data.titulo + "\\n" + data.descripcion);
  }
}

document.getElementById('closeDetail').addEventListener('click', () => dialog.close());

/* Validaciones JS simples para comprobar el XML cuando se carga */
function validateElementNode(el) {
  const anio = el.getElementsByTagName('anio')[0]?.textContent || '';
  return /^\d{4}$/.test(anio);
}
</script>
</body>
</html>
