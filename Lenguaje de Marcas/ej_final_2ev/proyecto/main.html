<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Galería - Plantas vs Zombies</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="grid-container">
        <!-- Header -->
        <header id="main-header">
            <h1>🌻 MI JARDÍN DE PLANTAS 🌻</h1>
            <p>Colección completa de defensores del jardín</p>
        </header>

        <!-- Buscador -->
        <div class="search-section">
            <input type="text" id="search-input" placeholder="Buscar planta...">
            <button id="search-btn">🔍 Buscar</button>
        </div>

        <!-- Selector de tema -->
        <div class="theme-section">
            <label for="theme-select">🎨 Tema:</label>
            <select id="theme-select">
                <option value="light">Modo claro</option>
                <option value="dark">Modo oscuro</option>
                <option value="custom">Modo personalizado</option>
            </select>
        </div>

        <!-- Botón añadir planta -->
        <div class="add-section">
            <button id="add-plant-btn">➕ Añadir planta</button>
        </div>

        <!-- Main con tarjetas -->
        <main id="card-container">
            <!-- Las tarjetas se cargarán aquí dinámicamente -->
        </main>

        <!-- Footer -->
        <footer id="main-footer">
            <p>© 2026 - Mi Galería de Plantas vs Zombies | Proyecto LM</p>
            <p>Creado con 🌱 para defender el jardín</p>
        </footer>
    </div>

    <!-- Modal para añadir planta -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h2>Añadir nueva planta</h2>
            <form id="add-plant-form">
                <label for="plant-title">Título:</label>
                <input type="text" id="plant-title" required>
                
                <label for="plant-desc">Descripción:</label>
                <textarea id="plant-desc" rows="3" required></textarea>
                
                <label for="plant-image">Imagen:</label>
                <input type="file" id="plant-image" accept="image/*" required>
                
                <div class="modal-buttons">
                    <button type="submit">Añadir</button>
                    <button type="button" id="close-modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal para tema personalizado -->
    <div id="custom-theme-modal" class="modal">
        <div class="modal-content">
            <h2>Personalizar colores</h2>
            <form id="custom-theme-form">
                <label for="header-color">Color del header:</label>
                <input type="color" id="header-color" value="#ffffff">
                
                <label for="main-color">Color del main:</label>
                <input type="color" id="main-color" value="#ffffff">
                
                <label for="footer-color">Color del footer:</label>
                <input type="color" id="footer-color" value="#ffffff">
                
                <div class="modal-buttons">
                    <button type="submit">Aplicar</button>
                    <button type="button" id="close-theme-modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
